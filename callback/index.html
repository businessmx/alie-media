<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ALIE TikTok Publisher — Autorización</title>
<style>
  body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;max-width:720px;
       margin:60px auto;padding:0 20px;line-height:1.6;color:#222;text-align:center}
  h1{font-size:1.5em}
  .ok{color:#0a7d2c;font-size:2.4em;margin:10px 0}
  .err{color:#c22;font-size:2em;margin:10px 0}
  code{display:block;background:#f4f4f4;border:1px solid #ddd;border-radius:8px;
       padding:14px;margin:18px auto;word-break:break-all;font-size:.95em;max-width:640px}
  button{background:#e33;color:#fff;border:0;border-radius:8px;padding:12px 24px;
         font-size:1em;cursor:pointer}
  button:hover{background:#c22}
  .sub{color:#777;font-size:.9em}
  @media (prefers-color-scheme: dark){body{background:#111;color:#ddd}
    code{background:#1c1c1c;border-color:#333}.sub{color:#999}}
</style>
</head>
<body>
<h1>ALIE TikTok Publisher</h1>
<div id="icono" class="ok">✓</div>
<p id="msg"><strong>Autorización recibida / Authorization received.</strong></p>
<p class="sub">Vuelve a la terminal y pega la URL completa de esta página.<br>
Return to the terminal and paste this page's full URL.</p>
<code id="dato">—</code>
<button onclick="copiar()">Copiar URL / Copy URL</button>
<p class="sub" id="copiado"></p>
<script>
  var q = new URLSearchParams(location.search);
  var code = q.get("code"), error = q.get("error");
  if (error) {
    document.getElementById("icono").textContent = "✕";
    document.getElementById("icono").className = "err";
    document.getElementById("msg").innerHTML =
      "<strong>Autorización denegada / Authorization denied:</strong> " + error;
    document.getElementById("dato").textContent = q.get("error_description") || error;
  } else if (code) {
    document.getElementById("dato").textContent = location.href;
  } else {
    document.getElementById("icono").textContent = "…";
    document.getElementById("msg").innerHTML =
      "Esta es la página de retorno OAuth de ALIE TikTok Publisher.<br>" +
      "This is the OAuth redirect page for ALIE TikTok Publisher.";
    document.getElementById("dato").textContent = "Sin código en la URL / No code in URL";
  }
  function copiar(){
    navigator.clipboard.writeText(location.href).then(function(){
      document.getElementById("copiado").textContent = "✓ Copiada / Copied";
    });
  }
</script>
</body>
</html>
